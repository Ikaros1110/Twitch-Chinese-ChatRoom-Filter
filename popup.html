<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitch Chat Filter</title>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin: 0 0 20px 0;
      font-size: 18px;
      color: #333;
      text-align: center;
    }

    .filter-control {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .filter-label {
      font-size: 14px;
      color: #555;
      font-weight: 500;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 26px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #9147ff;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    .status {
      text-align: center;
      padding: 10px;
      border-radius: 4px;
      font-size: 13px;
      margin-top: 15px;
    }

    .status.enabled {
      background-color: #e8f5e9;
      color: #2e7d32;
    }

    .status.disabled {
      background-color: #ffebee;
      color: #c62828;
    }

    .info {
      font-size: 12px;
      color: #666;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #e0e0e0;
      line-height: 1.4;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #999;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛡️ Twitch Chat Filter</h1>
    
    <div class="filter-control">
      <span class="filter-label">Enable Filter</span>
      <label class="toggle-switch">
        <input type="checkbox" id="filterToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div id="status" class="status enabled">
      Filter is <strong>ENABLED</strong>
    </div>

    <div class="info">
      This extension filters malicious messages, Unicode attacks, and harassing content in Twitch chat.
    </div>

    <div class="footer">
      v1.0.0
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
